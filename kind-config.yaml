kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
  # 🟣 Control Plane
  - role: control-plane
    extraPortMappings:
      # Argo CD / Ingress HTTP
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP

      # HTTPS
      - containerPort: 30443
        hostPort: 30443
        protocol: TCP

      # NodePort example
      - containerPort: 30000
        hostPort: 30000
        protocol: TCP

  # 🟢 Worker Node 1
  - role: worker

  # 🟢 Worker Node 2
  - role: worker